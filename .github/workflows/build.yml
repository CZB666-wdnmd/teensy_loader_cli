name: Build Android armv7a Static & Release

on:
  push:
    tags:
      - 'v*' # 当推送形如 v1.0.0 的 tag 时自动触发
  workflow_dispatch: # 允许手动在 Actions 页面触发
    inputs:
      release_tag:
        description: '发布版本号 (如 nightly 或 v1.0.1)'
        required: true
        default: 'latest'

permissions:
  contents: write # 必须：赋予创建 Release 和上传文件的权限

jobs:
  build-and-release:
    name: Build and Release for Android 11 (armv7a)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config

      - name: Setup Android NDK Environment
        run: |
          NDK_PATH=$ANDROID_NDK_LATEST_HOME
          TOOLCHAIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64
          
          # Android 11 对应 API Level 30
          API=30
          TARGET_HOST=arm-linux-androideabi
          CC_TARGET=armv7a-linux-androideabi$API
          
          echo "CC=$TOOLCHAIN/bin/$CC_TARGET-clang" >> $GITHUB_ENV
          echo "AR=$TOOLCHAIN/bin/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB=$TOOLCHAIN/bin/llvm-ranlib" >> $GITHUB_ENV
          echo "STRIP=$TOOLCHAIN/bin/llvm-strip" >> $GITHUB_ENV
          echo "HOST_SYS=$TARGET_HOST" >> $GITHUB_ENV
          
          echo "PREFIX_DIR=$HOME/android_usb_build" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$HOME/android_usb_build/lib/pkgconfig" >> $GITHUB_ENV

      - name: Build libusb-1.0 (Static)
        run: |
          git clone https://github.com/libusb/libusb.git
          cd libusb
          git checkout v1.0.26 
          ./autogen.sh --host=$HOST_SYS \
                       --prefix=$PREFIX_DIR \
                       --disable-shared \
                       --enable-static \
                       --disable-udev
          make -j$(nproc)
          make install

      - name: Build libusb-compat-0.1 (Static)
        run: |
          git clone https://github.com/libusb/libusb-compat-0.1.git
          cd libusb-compat-0.1
          ./autogen.sh --host=$HOST_SYS \
                       --prefix=$PREFIX_DIR \
                       --disable-shared \
                       --enable-static
          make -j$(nproc)
          make install

      - name: Build teensy_loader_cli (Static for 3rd-party)
        run: |
          # 静态链接 libusb，动态链接系统级 liblog
          $CC -O2 -Wall -DUSE_LIBUSB \
              teensy_loader_cli.c -o teensy_loader_cli \
              -I$PREFIX_DIR/include \
              $PREFIX_DIR/lib/libusb.a \
              $PREFIX_DIR/lib/libusb-1.0.a \
              -llog
          
          # 剔除调试信息，减小体积
          $STRIP teensy_loader_cli

          # 验证文件格式
          file teensy_loader_cli
          
          # 重命名以便于在 Release 中识别
          mv teensy_loader_cli teensy_loader_cli-android-armv7a

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # 上传未经压缩的原始二进制文件
          files: teensy_loader_cli-android-armv7a
          # 如果是 tag 触发则使用 tag，如果是手动触发则使用输入的 tag 或 latest
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.release_tag }}
          name: Release ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.release_tag }}
